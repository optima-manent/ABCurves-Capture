name: Windows release package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          ABCT_RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $content = Get-Content -LiteralPath CMakeLists.txt -Raw
          $match = [regex]::Match(
            $content,
            '(?m)^\s*project\(\s*ABCurvesCaptureTrainer\s+VERSION\s+([0-9]+\.[0-9]+\.[0-9]+(?:\.[0-9]+)?)\b')
          if (-not $match.Success) {
            throw 'Could not read the release version from CMakeLists.txt'
          }
          $expected = 'v' + $match.Groups[1].Value
          if ($env:ABCT_RELEASE_TAG -cne $expected) {
            throw "Release tag '$env:ABCT_RELEASE_TAG' must exactly match '$expected'"
          }

      - name: Configure Windows x64 release
        run: >-
          cmake --preset windows-x64
          -DABCT_BUILD_APP=ON
          -DABCT_ENABLE_PACKAGING=ON

      - name: Build
        run: cmake --build --preset release

      - name: Run hardware-free contracts
        run: ctest --preset release

      - name: Create and smoke-test package
        run: cmake --build build/windows-x64 --config Release --target abct_package

      - name: Write archive SHA-256
        shell: pwsh
        run: |
          $packages = @(Get-ChildItem -LiteralPath build/windows-x64/package -Filter '*.zip' -File)
          if ($packages.Count -ne 1) {
            throw "Expected exactly one release ZIP, found $($packages.Count)"
          }
          $zip = $packages[0]
          $hash = (Get-FileHash -LiteralPath $zip.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($zip.Name)" | Set-Content -LiteralPath "$($zip.FullName).sha256" -Encoding ascii -NoNewline

      - name: Upload participant package
        uses: actions/upload-artifact@v4
        with:
          name: ABCurves-Capture-Trainer-windows-x64
          path: |
            build/windows-x64/package/*.zip
            build/windows-x64/package/*.zip.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          ABCT_RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $zip = Get-ChildItem -LiteralPath build/windows-x64/package -Filter '*.zip' -File | Select-Object -First 1
          $checksum = Get-Item -LiteralPath "$($zip.FullName).sha256"
          $version = $env:ABCT_RELEASE_TAG.Substring(1)
          gh release create $env:ABCT_RELEASE_TAG $zip.FullName $checksum.FullName `
            --verify-tag `
            --generate-notes `
            --title "ABCurves Capture Trainer $version"
